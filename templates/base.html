<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}청약알리미{% endblock %}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
      <i class="bi bi-house-heart-fill me-2"></i>청약알리미
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
             href="{{ url_for('index') }}">
            <i class="bi bi-grid-1x2 me-1"></i>대시보드
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'profile_page' %}active{% endif %}"
             href="{{ url_for('profile_page') }}">
            <i class="bi bi-person-circle me-1"></i>내 정보
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'settings_page' %}active{% endif %}"
             href="{{ url_for('settings_page') }}">
            <i class="bi bi-gear me-1"></i>카카오 설정
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 플래시 메시지 -->
<div class="container mt-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<!-- 메인 콘텐츠 -->
<main class="container my-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 border-top mt-5">
  <small>청약알리미 &mdash; 청약 자격 자동 확인 &amp; 카카오톡 알림 서비스</small>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
